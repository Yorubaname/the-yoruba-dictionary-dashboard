<div class="panel panel-default" ng-repeat="definition in word.definitions track by $index">
    <div class="panel-heading">
        <a class="btn btn-xs btn-danger remove" ng-click="remove_definition($index)" title="Remove definition">
            <i class="fa fa-times text-right"></i>
        </a>
    </div>
    <div class="panel-body">
        <div class="row definition">
            <div class="col-sm-8">
                <label for="definition" class="required">Definition (Yoruba)</label>
                <textarea id="definition" class="form-control" name="part[{{$index}}]" ng-model="definition.content"
                    required></textarea>
                <span ng-show="form.part[{{$index}}].$invalid && !form.part[{{$index}}].$pristine"
                    class="help-block text-danger">Definition in Yoruba part is required</span>
            </div>
            <div class="col-sm-4">
                <label>English equivalent</label>
                <textarea class="form-control" name="meaning[{{$index}}]"
                    ng-model="definition.englishTranslation"></textarea>
            </div>
        </div>
        <div class="row" ng-if="is_review_required(definition)">
            <div class="col-sm-12">
                <label class="checkbox-inline">
                    <input type="checkbox" name="reviewed[{{$index}}]" ng-model="definition.reviewed" ng-required="is_review_required(definition)" ng-disabled="!can_mark_reviewed(definition)">
                    Reviewed
                </label>
                <span ng-show="!can_mark_reviewed(definition)" class="help-block text-warning">
                    Populate the Yoruba definition before marking this item as reviewed.
                </span>
                <span ng-show="form.$dirty && can_mark_reviewed(definition) && !definition.reviewed" class="help-block text-danger">
                    Please mark this definition as reviewed before saving or publishing.
                </span>
            </div>
        </div>
        <p class="text-right help-block">
            <a ng-click="add_example(definition)">Add an example</a>
        </p>
        <div class="row example" ng-repeat="example in definition.examples track by $index">
            <div class="col-sm-12">
                <h4>EXAMPLE</h4>
            </div>
            <div class="col-sm-6">
                <label for="yoruba-example">In Yoruba</label>
                <textarea id="yoruba-example" cols="10" rows="3" class="form-control" ng-model="example.content"
                    required></textarea>
            </div>
            <div class="col-sm-4">
                <label for="english-example">English equivalent</label>
                <textarea id="english-example" cols="10" rows="3" class="form-control"
                    ng-model="example.englishTranslation"></textarea>
            </div>
            <div class="col-sm-2">
                <label for="example-type" class="required">Type</label>
                <select ng-model="example.type" id="example-type" class="form-control" required>
                    <option value="" selected="selected" disabled="disabled">-Type-</option>
                    <option value="Other">General</option>
                    <option value="Song">Song</option>
                    <option value="Proverb">Aphorism/Proverb</option>
                </select>
            </div>
            <div class="col-sm-12 text-right">
                <a class="btn btn-xs btn-danger remove" ng-click="remove_example(definition, $index)" title="Remove example">
                    <i class="fa fa-times"></i>
                </a>
            </div>
        </div>
    </div>
</div>
